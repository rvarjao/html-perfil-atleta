<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Perfil de Atleta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container">

        <header id="topo">
            <h1>Perfil de Atleta</h1>
            <p class="subtitulo">Complete as informações abaixo</p>
        </header>

        <main>

            <section id="perfil" class="card">

                <!-- TROCAR IMAGEM -->
                <!-- Coloque a URL da sua foto em src, pode ser uma da internet ou do seu computador -->
                <img id="foto-atleta" src="https://static.corinthians.com.br/uploads/17460249976f3b2755d224d99e8f36a37690812793.png" alt="Foto">

                <div class="info-principal">
                    <!-- PREENCHER -->
                    <h2 class="nome-atleta">SEU NOME</h2>

                    <!-- PREENCHER -->
                    <p class="destaque">Seu esporte aqui</p>

                    <!-- PREENCHER -->
                    <p class="descricao">
                        Escreva uma pequena descrição sobre você como atleta.
                    </p>

                    <a href="#" class="botao">Seguir</a>
                </div>

            </section>

            <section id="informacoes" class="card">
                <h3 class="titulo-secao">Informações</h3>

                <!-- COMPLETAR -->
                <div class="linha-info">
                    <span class="rotulo">Idade:</span>
                    <span>__</span>
                </div>

                <div class="linha-info">
                    <span class="rotulo">Esporte:</span>
                    <span>__</span>
                </div>

                <div class="linha-info">
                    <span class="rotulo">Cidade:</span>
                    <span>__</span>
                </div>

            </section>

            <section id="habilidades" class="card">
                <h3 class="titulo-secao">Habilidades</h3>

                <ul class="lista-habilidades">
                    <!-- ADICIONAR MAIS -->
                    <li class="habilidade">Habilidade 1</li>
                </ul>
            </section>

        </main>

        <footer id="rodape">
            <p>Aula de Front-End</p>
            <p>Desenvolvido por Ricardo Varjão</p>
        </footer>

    </div>

</body>
</html>
